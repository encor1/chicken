<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cluckshot.io</title>
  </head>
  <body>
    <form id="start-screen" class="start-screen">
      <div class="start-panel">
        <p class="kicker">Multiplayer Shooting Gallery</p>
        <h1>Cluckshot.io</h1>
        <label for="player-name">Name</label>
        <div class="join-row">
          <input id="player-name" name="player-name" maxlength="16" autocomplete="nickname" placeholder="Spielername" />
        </div>
        <div class="room-create">
          <label for="room-name">Create room</label>
          <div class="create-row">
            <input id="room-name" name="room-name" maxlength="24" placeholder="Room name" />
            <select id="room-mode" name="room-mode">
              <option value="pve">PvE</option>
              <option value="pvp">PvP</option>
            </select>
            <button type="submit">Create</button>
          </div>
        </div>
        <div class="room-browser">
          <div class="room-tabs" aria-label="Room filters">
            <button class="room-tab is-active" type="button" data-room-filter="all">All</button>
            <button class="room-tab" type="button" data-room-filter="pve">PvE</button>
            <button class="room-tab" type="button" data-room-filter="pvp">PvP</button>
          </div>
          <div id="rooms-list" class="rooms-list" aria-live="polite"></div>
        </div>
        <p class="hint">Create a public room or join an existing one. PvE is a team run; PvP is the classic timed score race.</p>
      </div>
    </form>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
