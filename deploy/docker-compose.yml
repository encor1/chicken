services:
  game:
    image: ${IMAGE}
    container_name: ${COMPOSE_PROJECT_NAME:-moorhuhn}-game
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
    labels:
      traefik.enable: "true"
      traefik.http.routers.moorhuhn.rule: Host(`${DOMAIN}`)
      traefik.http.routers.moorhuhn.entrypoints: ${TRAEFIK_ENTRYPOINT:-websecure}
      traefik.http.routers.moorhuhn.tls: "true"
      traefik.http.routers.moorhuhn.tls.certresolver: ${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      traefik.http.services.moorhuhn.loadbalancer.server.port: "3000"
    networks:
      - traefik

networks:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik}
